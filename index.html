<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-SPORTS Kora | إس سبورتس كورة</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        header { padding: 20px; border-bottom: 2px solid #39FF14; }
        .match-card { background: #111; margin: 10px; padding: 15px; border-radius: 10px; border: 1px solid #333; }
        .live-tag { color: #39FF14; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <header><h1>S-SPORTS Kora ⚽</h1></header>
    <div id="results">جاري جلب المباريات الحية...</div>

    <script>
        const API_KEY = "982093db0f2acd3d187e598d0fc1956c";
        async function loadMatches() {
            try {
                const res = await fetch("https://v3.football.api-sports.io/fixtures?live=all", {
                    headers: { "x-rapidapi-key": API_KEY, "x-rapidapi-host": "v3.football.api-sports.io" }
                });
                const data = await res.json();
                const container = document.getElementById('results');
                container.innerHTML = "";
                data.response.forEach(m => {
                    container.innerHTML += `
                        <div class="match-card">
                            <p>${m.league.name}</p>
                            <h3>${m.teams.home.name} ${m.goals.home} - ${m.goals.away} ${m.teams.away.name}</h3>
                            <p class="live-tag">الدقيقة ${m.fixture.status.elapsed}'</p>
                        </div>`;
                });
            } catch (e) { document.getElementById('results').innerText = "خطأ في الاتصال!"; }
        }
        loadMatches();
        setInterval(loadMatches, 60000);
    </script>
</body>
</html>
